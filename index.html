<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Little Moments — Keep the moments that matter</title>
  <meta name="description" content="A two-minute daily practice that captures one story-worthy moment from your day." />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --surface: #0a0a0a;
      --surface-2: #1a1a1a;
      --text: #ffffff;
      --text-secondary: rgba(255,255,255,0.7);
      --text-muted: rgba(255,255,255,0.4);
      --border: rgba(255,255,255,0.1);
      --border-light: rgba(255,255,255,0.05);
      --accent: #f0d7ff;
      --accent-light: #f5e6ff;
      --accent-dark: #d4a8f0;
      --on-accent: #1a1a1a;
      --premium: #FFCFB4;
      --radius-card: 16px;
      --radius-pill: 9999px;
      --font-display: 'Libre Baskerville', serif;
      --font-ui: 'Roboto', sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-weight: 400;
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── NAV (pill bar) ──────────────────────── */
    .nav-wrap {
      position: fixed;
      top: 16px;
      left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: center;
      padding: 0 20px;
      pointer-events: none;
    }
    nav {
      pointer-events: all;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-pill);
      padding: 10px 12px 10px 18px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      max-width: 720px;
      width: 100%;
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .nav-wordmark { height: 28px; width: auto; }
    .nav-tagline {
      flex: 1;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      line-height: 1.3;
      padding: 0 12px;
      position: relative;
    }
    .nav-tagline-memories {
      position: relative;
      display: inline;
    }
    .nav-tagline-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 130%;
      height: auto;
      pointer-events: none;
    }
    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--accent);
      color: var(--on-accent);
      font-family: var(--font-ui);
      font-weight: 500;
      font-size: 13px;
      text-decoration: none;
      padding: 9px 18px;
      border-radius: var(--radius-pill);
      border: 1.5px solid var(--on-accent);
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .nav-cta:hover { background: var(--accent-dark); }
    .nav-cta svg { width: 13px; height: 13px; fill: var(--on-accent); }

    /* ─── HERO ────────────────────────────────── */
    .hero {
      padding: 110px 28px 20px;
      text-align: center;
      max-width: 700px;
      margin: 0 auto;
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(28px, 4.2vw, 48px);
      font-weight: 400;
      line-height: 1.25;
      color: var(--text-secondary);
      margin-bottom: 0;
      white-space: nowrap;
    }
    .hero-title em {
      font-style: italic;
      color: var(--text);
    }
    .hero-white { color: var(--text); }
    .hero-last-tuesday {
      position: relative;
      display: inline-block;
    }
    .hero-underline-inline {
      position: absolute;
      left: -5%;
      bottom: -18px;
      width: 110%;
      height: auto;
      pointer-events: none;
    }
    .hero-fixes {
      margin-top: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .hero-fixes-icon { height: 32px; width: auto; }
    .hero-fixes-text {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }
    .hero-fixes-lm {
      font-family: var(--font-ui);
      font-weight: 700;
    }
    .hero-fixes-text span {
      font-weight: 400;
      font-style: italic;
      color: var(--text-secondary);
      position: relative;
      display: inline-block;
    }
    .hero-fixes-text span img {
      position: absolute;
      left: 0;
      bottom: -14px;
      width: 100%;
      height: auto;
      pointer-events: none;
    }

    /* ─── CHAT ────────────────────────────────── */
    .chat-section {
      position: relative;
      padding: 40px 0 200px;
    }
    .chat-container {
      max-width: 580px;
      margin: 0 auto;
      padding: 0 20px;
      position: relative;
      z-index: 2;
    }

    /* Side illustrations */
    .side-illustration {
      position: fixed;
      bottom: 0;
      z-index: 1;
      pointer-events: none;
      max-height: 440px;
      width: auto;
    }
    .side-left { left: -10px; }
    .side-right { right: -10px; }

    /* ─── MESSAGES ────────────────────────────── */
    .msg {
      margin-bottom: 16px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .msg.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Ellie (left, no bubble) */
    .msg-ellie {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding-right: 40px;
    }
    .ellie-avatar {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .ellie-body {
      font-size: 15px;
      line-height: 24px;
      color: var(--text);
    }
    .ellie-body strong { font-weight: 700; color: var(--accent); }
    .ellie-body em { color: var(--text-secondary); }

    /* Feature keyword links */
    .feature-keyword {
      color: var(--accent);
      font-weight: 700;
      text-decoration: underline;
      text-decoration-style: wavy;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
      cursor: pointer;
      position: relative;
    }
    .feature-keyword:hover { color: var(--accent-light); }

    /* Tooltip */
    .feature-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      width: 240px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      z-index: 50;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      pointer-events: none;
    }
    .feature-tooltip.show { display: block; }
    .feature-tooltip img { width: 100%; height: auto; object-fit: contain; display: block; }
    .feature-tooltip-text { padding: 10px 12px; font-size: 12px; line-height: 1.4; color: var(--text-secondary); }

    /* User (right bubble) */
    .msg-user {
      display: flex;
      justify-content: flex-end;
    }
    .user-bubble {
      background: var(--accent);
      color: var(--on-accent);
      font-size: 15px;
      line-height: 24px;
      padding: 10px 18px;
      border-radius: 20px 20px 4px 20px;
      max-width: 85%;
    }

    /* ─── THINKING DOTS ───────────────────────── */
    .thinking {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 16px;
    }
    .thinking-dots {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 24px;
      padding-top: 4px;
    }
    .thinking-dots span {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 0.96s ease-in-out infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.14s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.28s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-7px); }
    }

    /* ─── PROMPT CARDS ────────────────────────── */
    .cards-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
      margin-left: 38px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .cards-group.visible { opacity: 1; transform: translateY(0); }
    .prompt-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1.5px solid var(--accent);
      border-radius: 14px;
      background: transparent;
      cursor: pointer;
      transition: background 0.15s;
      text-align: left;
      width: 100%;
      font-family: var(--font-ui);
    }
    .prompt-card:hover { background: var(--surface-2); }
    .prompt-card.featured-card {
      background: var(--accent);
      border-color: var(--accent);
    }
    .prompt-card.featured-card .prompt-card-icon,
    .prompt-card.featured-card .prompt-card-title,
    .prompt-card.featured-card .prompt-card-sub,
    .prompt-card.featured-card .prompt-card-chevron { color: var(--on-accent); }
    .prompt-card.featured-card:hover { background: var(--accent-dark); }
    .prompt-card.used { opacity: 0.35; pointer-events: none; }
    .prompt-card-icon { font-size: 20px; color: var(--accent); flex-shrink: 0; width: 24px; text-align: center; }
    .prompt-card-title { font-weight: 500; font-size: 15px; color: var(--text); }
    .prompt-card-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .prompt-card-chevron { color: var(--text-muted); font-size: 14px; margin-left: auto; flex-shrink: 0; }

    /* ─── RICH CARDS ──────────────────────────── */
    .rich-card {
      margin-left: 38px;
      margin-bottom: 14px;
      border-radius: var(--radius-card);
      border: 1px solid var(--border);
      background: var(--surface-2);
      overflow: hidden;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .rich-card.visible { opacity: 1; transform: translateY(0); }
    .rich-card-body { padding: 20px; }
    .rich-card-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
    .rich-card-text { font-size: 14px; line-height: 22px; color: var(--text-secondary); }

    .testimonial-card {
      margin-left: 38px;
      margin-bottom: 12px;
      border-radius: var(--radius-card);
      border: 1px solid var(--border);
      background: var(--surface-2);
      padding: 20px;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .testimonial-card.visible { opacity: 1; transform: translateY(0); }
    .testimonial-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .testimonial-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; color: var(--text-muted); border: 1px solid var(--border); }
    .testimonial-author-name { font-size: 13px; color: var(--text-muted); }
    .testimonial-quote { font-family: var(--font-display); font-size: 15px; font-style: italic; line-height: 24px; color: var(--text); }

    /* Pricing */
    .pricing-row {
      margin-left: 38px;
      margin-bottom: 12px;
      display: flex;
      gap: 12px;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .pricing-row.visible { opacity: 1; transform: translateY(0); }
    .pricing-inline {
      flex: 1;
      border-radius: var(--radius-card);
      border: 1.5px solid var(--accent);
      background: var(--surface-2);
      padding: 24px 16px;
      text-align: center;
      position: relative;
    }
    .pricing-inline.free-tier {
      background: var(--bg);
      border-color: var(--border);
    }
    .pricing-inline.featured {
      border-width: 2px;
      border-color: var(--premium);
    }
    .pricing-badge { position: absolute; top: -11px; left: 50%; transform: translateX(-50%); background: var(--premium); color: var(--on-accent); font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; padding: 3px 14px; border-radius: var(--radius-pill); white-space: nowrap; }
    .pricing-plan { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .pricing-plan-img { height: 24px; width: auto; margin-bottom: 4px; }
    .pricing-price { font-family: var(--font-display); font-size: 32px; font-weight: 700; color: var(--text); }
    .pricing-period { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .pricing-note { font-size: 12px; color: var(--accent); margin-bottom: 14px; }
    .pricing-inline.featured .pricing-note { color: var(--premium); }
    .pricing-features { list-style: none; margin-bottom: 16px; text-align: left; }
    .pricing-features li { font-size: 12px; color: var(--text-secondary); padding: 3px 0; }
    .pricing-features li::before { content: '✓ '; color: var(--accent); }
    .pricing-inline.featured .pricing-features li::before { color: var(--premium); }
    .pricing-cta { display: inline-flex; align-items: center; gap: 8px; background: var(--accent); color: var(--on-accent); font-weight: 500; font-size: 13px; letter-spacing: 0.3px; text-transform: uppercase; text-decoration: none; padding: 10px 20px; border-radius: var(--radius-pill); border: 2px solid var(--on-accent); transition: background 0.15s; }
    .pricing-cta:hover { background: var(--accent-dark); }
    .pricing-cta.premium-cta { background: var(--premium); border-color: var(--on-accent); }
    .pricing-cta.premium-cta:hover { background: #f0b898; }

    /* Step cards */
    .step-card {
      margin-left: 38px; margin-bottom: 12px;
      border-radius: var(--radius-card); border: 1px solid var(--border);
      background: var(--surface-2); padding: 20px;
      display: flex; gap: 16px; align-items: flex-start;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .step-card.visible { opacity: 1; transform: translateY(0); }
    .step-number { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: var(--on-accent); font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .step-title { font-family: var(--font-display); font-weight: 700; font-size: 16px; color: var(--text); margin-bottom: 4px; }
    .step-desc { font-size: 14px; line-height: 22px; color: var(--text-secondary); }

    /* Word card */
    .word-card {
      margin-left: 38px; margin-bottom: 14px;
      border-radius: var(--radius-card); border: 1.5px solid var(--accent);
      padding: 28px 20px; text-align: center;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .word-card.visible { opacity: 1; transform: translateY(0); }
    .word-card-label { font-weight: 300; font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
    .word-card-word { font-family: var(--font-display); font-weight: 700; font-size: 36px; color: var(--text); text-transform: lowercase; }

    /* Photo prompt card */
    .photo-card {
      margin-left: 38px; margin-bottom: 14px;
      border-radius: var(--radius-card); border: 1px solid var(--border);
      background: var(--surface-2); overflow: hidden;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .photo-card.visible { opacity: 1; transform: translateY(0); }
    .photo-card-image {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: url('image.png') center / cover no-repeat;
    }
    .photo-card-date {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.5);
      border-radius: 8px;
      padding: 5px 10px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      color: #ffffff;
    }
    .photo-card-body { padding: 16px; }
    .photo-card-label { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
    .photo-card-text { font-size: 14px; color: var(--text-secondary); line-height: 20px; }

    /* Resonance list */
    .resonance-list {
      margin-left: 38px; margin-bottom: 14px;
      display: flex; flex-direction: column; gap: 8px;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .resonance-list.visible { opacity: 1; transform: translateY(0); }
    .resonance-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--surface-2);
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.4;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .resonance-item .resonance-front,
    .resonance-item .resonance-back {
      transition: opacity 0.25s ease;
    }
    .resonance-item .resonance-back {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center;
      padding: 12px 16px;
      opacity: 0;
      font-size: 13px;
      color: #ffffff;
      line-height: 1.4;
    }
    .resonance-item.flipped {
      background: #024F46;
      border-color: #ffffff;
    }
    .resonance-item.flipped .resonance-front { opacity: 0; }
    .resonance-item.flipped .resonance-back { opacity: 1; }
    .resonance-icon { flex-shrink: 0; font-size: 16px; color: #ffffff; font-weight: 700; }

    /* Thread mock card */
    .thread-card {
      margin-left: 38px; margin-bottom: 14px;
      border-radius: var(--radius-card); overflow: hidden;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .thread-card.visible { opacity: 1; transform: translateY(0); }
    .thread-card img { width: 100%; display: block; border-radius: var(--radius-card); }

    /* ─── DOWNLOAD CTA (in chat) ─────────────── */
    .chat-cta {
      margin-left: 38px;
      margin-top: 8px;
      margin-bottom: 16px;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .chat-cta.visible { opacity: 1; transform: translateY(0); }
    .chat-cta a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: var(--on-accent);
      font-family: var(--font-ui);
      font-weight: 500;
      font-size: 15px;
      letter-spacing: 0.3px;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: var(--radius-pill);
      border: 2px solid var(--on-accent);
      transition: background 0.15s;
    }
    .chat-cta a:hover { background: var(--accent-dark); }
    .chat-cta a svg { width: 16px; height: 16px; fill: var(--on-accent); }

    /* ─── FOOTER ──────────────────────────────── */
    .footer {
      text-align: center;
      padding: 40px 28px;
      border-top: 1px solid var(--border-light);
    }
    .footer-links { display: flex; justify-content: center; gap: 24px; margin-bottom: 12px; }
    .footer-links a { font-size: 13px; color: var(--text-muted); text-decoration: none; }
    .footer-links a:hover { color: var(--text); }
    .footer-copy { font-size: 12px; color: var(--text-muted); }

    /* ─── RESPONSIVE ──────────────────────────── */
    @media (max-width: 768px) {
      .side-illustration { display: none; }
      .nav-tagline { display: none; }
      nav { max-width: 420px; }
      .hero { padding: 90px 20px 16px; }
      .hero-title { font-size: 28px; }
      .chat-container { padding: 0 16px; }
      .cards-group, .rich-card, .testimonial-card, .pricing-row, .step-card, .word-card, .photo-card, .resonance-list, .thread-card, .chat-cta { margin-left: 0; }
      .pricing-row { flex-direction: column; }
      .feature-tooltip { left: 0; transform: none; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <div class="nav-wrap">
    <nav>
      <div class="nav-left">
        <img src="wordmark-little-moments 2.png" alt="Little Moments" class="nav-wordmark" />
      </div>
      <div class="nav-tagline">Capture a lifetime of <span class="nav-tagline-memories">memories<img src="circle-1.png" alt="" class="nav-tagline-circle" /></span>, starting with a single word</div>
      <a href="https://testflight.apple.com/join/g72C8rQE" class="nav-cta">
        <svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>

  <section class="hero">

  <!-- SIDE ILLUSTRATIONS -->
  <img src="hero.png" alt="" class="side-illustration side-left" />
  <img src="thread.png" alt="" class="side-illustration side-right" />

  <!-- CHAT -->
  <section class="chat-section">
    <div class="chat-container" id="chat"></div>
  </section>

  <footer class="footer">
    <div class="footer-links">
      <a href="https://www.the-diff.com" target="_blank">Follow my build in public</a>
    </div>
    <p class="footer-copy">&copy; 2026 Little Moments. All rights reserved.</p>
  </footer>

  <script>
    const chat = document.getElementById('chat');
    const TYPING_DELAY = 2000;
    let introPhase = true; // track whether we're in intro (no scroll)

    // ── Feature tooltip definitions
    const featureTooltips = {
      'Capture': { img: 'capture-preview.png', desc: 'Speak or type one real moment from your day. Two minutes, one memory captured forever.' },
      'Capsule': { img: 'capsule-preview.jpg', desc: 'Your personal time capsule — every moment you\'ve ever captured, searchable and always yours.' },
      'Chapters': { img: 'chapter-preview.png', desc: 'Beautiful monthly collections that turn your moments into a story of your life.' },
      'Threads': { img: 'thread-preview.png', desc: 'Hidden connections between your moments — recurring people, places, and themes you didn\'t notice.' },
    };

    // ── Resonance card solutions
    const resonanceSolutions = [
      'Little Moments gives you one prompt a day — a single word or photo — so each day feels distinct again.',
      'Ellie helps you dig into everyday details you\'d normally overlook.',
      'Your memory archive becomes searchable. Last week, last month, last year — it\'s all there.',
      'Two minutes. One prompt. Speak or type. That\'s it — the lowest friction habit you\'ll build.',
      'Every moment you capture is saved forever in your personal memory Capsule.',
      'Build a family archive you can share and revisit together for years to come.',
    ];

    // ── All topics and their content
    const topics = {
      'how-it-works': {
        userMsg: 'How does it work?',
        content: [
          { type: 'ellie', text: 'It\'s simple. Four steps, every day.' },
          { type: 'step', number: '1', title: 'Get your prompt', desc: 'A single word or photo from your library. It\'s the spark — not the story.' },
          { type: 'word-card' },
          { type: 'ellie', text: 'Or you might get a photo from your camera roll...' },
          { type: 'photo-card' },
          { type: 'step', number: '2', title: 'Capture your moment', desc: 'Speak or type one real moment from your day that the prompt reminds you of. Two minutes or less.' },
          { type: 'step', number: '3', title: 'Ellie digs deeper', desc: 'Ellie asks you one optional follow-up based on what you shared — like a friend asking the right question. She\'s there to make your moment as rich as possible, and to keep helping you dig deeper if you want her to.' },
          { type: 'step', number: '4', title: 'Build your archive', desc: 'Every moment is saved, searchable, and yours forever. Over time we create Chapters, find Threads between your moments, and build your memory Capsule.' },
          { type: 'ellie', text: 'That\'s the whole thing. <strong>No long journaling sessions.</strong> No blank pages. Just one moment, every day — with Ellie by your side to get one extra layer to your memory.' },
        ]
      },
      'what-makes-different': {
        userMsg: 'What makes it different?',
        content: [
          { type: 'ellie', text: 'Most journaling apps give you a blank page and hope for the best. <strong>Little Moments is the opposite.</strong>' },
          { type: 'rich-card', title: 'What it is', text: 'A guided, two-minute daily practice. You get a creative prompt — a word or a photo — and you capture one specific moment. Not a diary entry. Not a summary. A <em>moment.</em>' },
          { type: 'rich-card', title: 'What it isn\'t', text: 'It\'s not a journal with blank pages. It\'s not a daily planner. It\'s not a gratitude list. And it doesn\'t try to write your story for you.' },
          { type: 'ellie', text: 'It\'s for anyone who suspects their life is more interesting than they give it credit for — and wants <strong>proof.</strong>' },
          { type: 'ellie', text: 'It\'s an app that doesn\'t want you spending time in it until you have a memory archive you want to come back to.' },
        ]
      },
      'testimonials': {
        userMsg: 'What do people say?',
        content: [
          { type: 'ellie', text: 'Here\'s what people tell us after a few weeks:' },
          { type: 'testimonial', quote: '"I didn\'t think I had anything worth writing about. Turns out I just wasn\'t paying attention."', author: 'Early tester, 3 weeks in', initials: 'ET' },
          { type: 'testimonial', quote: '"It\'s not a journal. It\'s more like... a mirror. Two minutes and suddenly I see my day differently."', author: 'Beta user', initials: 'BU' },
          { type: 'testimonial', quote: '"My kids ask me to read them a moment every night before bed now. We\'re building our family story."', author: 'Parent & founding member', initials: 'FM' },
          { type: 'ellie', text: 'The best part? <strong>Most people don\'t realize what they have until they look back.</strong>' },
        ]
      },
      'pricing': {
        userMsg: 'What does it cost?',
        content: [
          { type: 'ellie', text: '<strong>Little Moments is free to use.</strong> You can capture moments, get prompts, and talk to Ellie every day — no charge.' },
          { type: 'pricing-row' },
          { type: 'ellie', text: 'Most people start free and upgrade when their archive grows into something they want to keep forever.' },
        ]
      },
      'threads': {
        userMsg: 'What are Threads?',
        content: [
          { type: 'ellie', text: 'As you capture moments, we quietly find <strong>connections between them</strong> — recurring people, places, feelings, themes.' },
          { type: 'ellie', text: 'We call these <strong>Threads</strong>. They\'re the stories running through your life that you might not notice on your own.' },
          { type: 'thread-mock' },
          { type: 'ellie', text: 'You don\'t have to do anything extra. Just keep capturing moments — we\'ll surface the patterns.' },
        ]
      }
    };

    const promptCardDefs = [
      { id: 'how-it-works', icon: '⚡', title: 'How does it work?', sub: 'The daily flow in 60 seconds' },
      { id: 'what-makes-different', icon: '✦', title: 'What makes it different?', sub: 'What it is — and what it isn\'t' },
      { id: 'testimonials', icon: '💬', title: 'What do people say?', sub: 'From real users' },
      { id: 'threads', icon: '🧵', title: 'What are Threads?', sub: 'How moments connect over time' },
      { id: 'pricing', icon: '✨', title: 'What does it cost?', sub: 'Simple, transparent pricing' },
    ];

    const usedTopics = new Set();

    // ── Intro message (single Ellie message, two paragraphs)
    const introMessage = 'Every day you get just one <strong>word</strong>, or a <strong>photo</strong> you took as a memory prompt. Speak or type to add it.<br/><br/>In less than 2 minutes a day, <span class="feature-keyword" data-feature="Capture">Capture</span> one little moment. We\'ll then build your memory <span class="feature-keyword" data-feature="Capsule">Capsule</span>, create beautiful memory <span class="feature-keyword" data-feature="Chapters">Chapters</span>, and make <span class="feature-keyword" data-feature="Threads">Threads</span> between your moments.';

    const resonanceItems = [
      { icon: '✓', text: 'I feel like days are blurring together' },
      { icon: '✓', text: 'I want to notice little moments in my day better' },
      { icon: '✓', text: 'I can\'t remember what happened last week' },
      { icon: '✓', text: 'I want a low-effort journaling habit that actually sticks' },
      { icon: '✓', text: 'I want to record my memories for myself' },
      { icon: '✓', text: 'I want to archive my memories for my family' },
    ];

    // ── DOM helpers
    function createEllie(html) {
      const div = document.createElement('div');
      div.className = 'msg msg-ellie';
      div.innerHTML = `<img src="thread-icon.png" alt="Ellie" class="ellie-avatar"/><div class="ellie-body">${html}</div>`;
      return div;
    }
    function createUser(text) {
      const div = document.createElement('div');
      div.className = 'msg msg-user';
      div.innerHTML = `<div class="user-bubble">${text}</div>`;
      return div;
    }
    function createThinking() {
      const div = document.createElement('div');
      div.className = 'thinking';
      div.id = 'thinking-indicator';
      div.innerHTML = `<img src="thread-icon.png" alt="" class="ellie-avatar"/><div class="thinking-dots"><span></span><span></span><span></span></div>`;
      return div;
    }
    function removeThinking() {
      const t = document.getElementById('thinking-indicator');
      if (t) t.remove();
    }

    // ── Tooltip setup
    function setupTooltips(container) {
      container.querySelectorAll('.feature-keyword').forEach(kw => {
        const feature = kw.dataset.feature;
        const data = featureTooltips[feature];
        if (!data) return;
        const tooltip = document.createElement('div');
        tooltip.className = 'feature-tooltip';
        tooltip.innerHTML = `<img src="${data.img}" alt="${feature}"/><div class="feature-tooltip-text">${data.desc}</div>`;
        kw.appendChild(tooltip);
        const show = () => tooltip.classList.add('show');
        const hide = () => tooltip.classList.remove('show');
        kw.addEventListener('mouseenter', show);
        kw.addEventListener('mouseleave', hide);
        kw.addEventListener('click', (e) => {
          e.stopPropagation();
          tooltip.classList.toggle('show');
        });
      });
    }

    function createPromptCards() {
      const remaining = promptCardDefs.filter(d => !usedTopics.has(d.id));
      if (remaining.length === 0) return null;
      const group = document.createElement('div');
      group.className = 'cards-group';
      remaining.forEach((d, i) => {
        const btn = document.createElement('button');
        btn.className = 'prompt-card' + (i === 0 ? ' featured-card' : '');
        btn.innerHTML = `<span class="prompt-card-icon">${d.icon}</span><div><div class="prompt-card-title">${d.title}</div><div class="prompt-card-sub">${d.sub}</div></div><span class="prompt-card-chevron">›</span>`;
        btn.addEventListener('click', () => expandTopic(d.id));
        group.appendChild(btn);
      });
      return group;
    }

    function buildContentElement(item) {
      if (item.type === 'ellie') return createEllie(item.text);
      if (item.type === 'step') {
        const d = document.createElement('div');
        d.className = 'step-card';
        d.innerHTML = `<div class="step-number">${item.number}</div><div><div class="step-title">${item.title}</div><div class="step-desc">${item.desc}</div></div>`;
        return d;
      }
      if (item.type === 'word-card') {
        const d = document.createElement('div');
        d.className = 'word-card';
        d.innerHTML = `<div class="word-card-label">today's word</div><div class="word-card-word">kitchen</div>`;
        return d;
      }
      if (item.type === 'photo-card') {
        const d = document.createElement('div');
        d.className = 'photo-card';
        d.innerHTML = `<div class="photo-card-image"><div class="photo-card-date">Jun 14, 2025</div></div><div class="photo-card-body"><div class="photo-card-label">today's photo prompt</div><div class="photo-card-text">A photo from your camera roll. What moment does this bring back?</div></div>`;
        return d;
      }
      if (item.type === 'rich-card') {
        const d = document.createElement('div');
        d.className = 'rich-card';
        d.innerHTML = `<div class="rich-card-body"><div class="rich-card-title">${item.title}</div><div class="rich-card-text">${item.text}</div></div>`;
        return d;
      }
      if (item.type === 'testimonial') {
        const d = document.createElement('div');
        d.className = 'testimonial-card';
        d.innerHTML = `<div class="testimonial-header"><div class="testimonial-avatar">${item.initials}</div><div class="testimonial-author-name">${item.author}</div></div><div class="testimonial-quote">${item.quote}</div>`;
        return d;
      }
      if (item.type === 'pricing-row') {
        const d = document.createElement('div');
        d.className = 'pricing-row';
        d.innerHTML = `
          <div class="pricing-inline free-tier">
            <div class="pricing-plan">Free</div>
            <div class="pricing-price">$0</div>
            <div class="pricing-period">forever</div>
            <div class="pricing-note">Everything you need to start</div>
            <ul class="pricing-features">
              <li>Daily word + photo prompts</li>
              <li>Speak or type moments</li>
              <li>Ellie follow-ups to dig deeper</li>
              <li>Up to 1 year of history</li>
              <li>Up to 3 Threads</li>
            </ul>
            <a href="https://testflight.apple.com/join/g72C8rQE" class="pricing-cta">Download for Free</a>
          </div>
          <div class="pricing-inline featured">
            <div class="pricing-badge">Best Value</div>
            <img src="wordmark-premium.png" alt="Premium" class="pricing-plan-img" />
            <div class="pricing-price" style="color:var(--premium);">$10</div>
            <div class="pricing-period">per month</div>
            <div class="pricing-note">or $100/year (save ~17%)</div>
            <ul class="pricing-features">
              <li>Unlimited history beyond 1 year</li>
              <li>Unlimited Threads</li>
              <li>Beautiful monthly Chapters</li>
              <li>Support our 5% Pledge</li>
            </ul>
            <a href="https://testflight.apple.com/join/g72C8rQE" class="pricing-cta premium-cta">Explore Premium</a>
          </div>`;
        return d;
      }
      if (item.type === 'thread-mock') {
        const d = document.createElement('div');
        d.className = 'thread-card';
        d.innerHTML = `<img src="thread-mock.png" alt="Thread found notification"/>`;
        return d;
      }
      return null;
    }

    // ── Show element with scroll
    function showElement(el, scrollToStart) {
      void el.offsetHeight;
      el.classList.add('visible');
      if (introPhase) return; // don't scroll during intro
      if (scrollToStart) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else {
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    // ── Sequential queue runner
    let animating = false;
    const animQueue = [];

    function enqueue(fn) {
      animQueue.push(fn);
      if (!animating) drainQueue();
    }
    function drainQueue() {
      if (animQueue.length === 0) { animating = false; return; }
      animating = true;
      const fn = animQueue.shift();
      fn(() => drainQueue());
    }

    // Add a thinking pause then reveal element
    function enqueueMessage(el, isEllie) {
      if (isEllie) {
        enqueue(done => {
          const dots = createThinking();
          chat.appendChild(dots);
          if (!introPhase) dots.scrollIntoView({ behavior: 'smooth', block: 'end' });
          setTimeout(done, TYPING_DELAY);
        });
        enqueue(done => {
          removeThinking();
          chat.appendChild(el);
          showElement(el);
          setupTooltips(el);
          setTimeout(done, 200);
        });
      } else {
        enqueue(done => {
          chat.appendChild(el);
          showElement(el);
          setTimeout(done, 400);
        });
      }
    }

    function enqueueCard(el) {
      enqueue(done => {
        chat.appendChild(el);
        showElement(el);
        setTimeout(done, 300);
      });
    }

    // ── Show prompt cards after content (or final CTA if all used)
    function enqueuePromptCards() {
      enqueue(done => {
        chat.querySelectorAll('.cards-group').forEach(g => g.remove());
        const cards = createPromptCards();
        if (cards) {
          chat.appendChild(cards);
          showElement(cards);
          setTimeout(done, 200);
        } else {
          setTimeout(done, 200);
        }
      });
      if (usedTopics.size === promptCardDefs.length) {
        enqueueMessage(createEllie('Why don\'t you give Little Moments a go? I\'ll see you inside and help you capture that first moment. Who knows what it will be!'), true);
        enqueue(done => {
          const cta = document.createElement('div');
          cta.className = 'chat-cta';
          cta.innerHTML = `<a href="https://testflight.apple.com/join/g72C8rQE"><svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>Download for free</a>`;
          chat.appendChild(cta);
          showElement(cta);
          setTimeout(done, 300);
        });
      }
    }

    // ── Expand a topic
    function expandTopic(topicId) {
      if (usedTopics.has(topicId)) return;
      usedTopics.add(topicId);
      introPhase = false;

      chat.querySelectorAll('.cards-group').forEach(g => g.remove());

      const topic = topics[topicId];
      if (!topic) return;

      const userEl = createUser(topic.userMsg);
      enqueue(done => {
        chat.appendChild(userEl);
        void userEl.offsetHeight;
        userEl.classList.add('visible');
        userEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        setTimeout(done, 400);
      });

      topic.content.forEach(item => {
        const el = buildContentElement(item);
        if (!el) return;
        const isEllie = item.type === 'ellie';
        if (isEllie) {
          enqueueMessage(el, true);
        } else {
          enqueue(done => {
            const dots = createThinking();
            chat.appendChild(dots);
            dots.scrollIntoView({ behavior: 'smooth', block: 'end' });
            setTimeout(done, 1200);
          });
          enqueue(done => {
            removeThinking();
            chat.appendChild(el);
            showElement(el);
            setTimeout(done, 300);
          });
        }
      });

      enqueuePromptCards();
    }

    // ── Intro sequence
    function playIntro() {
      introPhase = true;
      const el = createEllie(introMessage);
      enqueueMessage(el, true);

      // Resonance list
      enqueue(done => {
        const dots = createThinking();
        chat.appendChild(dots);
        setTimeout(done, TYPING_DELAY);
      });
      enqueue(done => {
        removeThinking();
        const intro = createEllie('If any of these resonate, this is for you:');
        chat.appendChild(intro);
        requestAnimationFrame(() => showElement(intro));
        setTimeout(done, 300);
      });
      enqueue(done => {
        const list = document.createElement('div');
        list.className = 'resonance-list';
        resonanceItems.forEach((r, idx) => {
          const item = document.createElement('div');
          item.className = 'resonance-item';
          item.innerHTML = `<span class="resonance-front"><span class="resonance-icon">${r.icon}</span> ${r.text}...</span><span class="resonance-back">${resonanceSolutions[idx]}</span>`;
          item.addEventListener('click', () => item.classList.toggle('flipped'));
          item.addEventListener('mouseenter', () => item.classList.add('flipped'));
          item.addEventListener('mouseleave', () => item.classList.remove('flipped'));
          list.appendChild(item);
        });
        chat.appendChild(list);
        requestAnimationFrame(() => showElement(list));
        setTimeout(done, 400);
      });

      enqueueMessage(createEllie('<strong>Little Moments</strong> is for you.'), true);
      enqueueMessage(createEllie('Want to know more? Pick a topic:'), true);
      enqueuePromptCards();
    }

    // ── Scroll-based fade for side illustrations
    function updateSideFade() {
      const maxScroll = 600;
      const scrollY = window.scrollY;
      const opacity = Math.max(0, 1 - scrollY / maxScroll);
      document.querySelectorAll('.side-illustration').forEach(img => {
        img.style.opacity = opacity;
      });
    }
    window.addEventListener('scroll', updateSideFade, { passive: true });

    window.addEventListener('DOMContentLoaded', playIntro);
  </script>
