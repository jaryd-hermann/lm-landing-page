<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Little Moments — Keep the moments that matter</title>
  <meta name="description" content="A two-minute daily practice that captures one story-worthy moment from your day." />
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFFFEB;
      --ink: #1a1a1a;
      --muted: rgba(26,26,26,0.55);
      --accent: #f0d7ff;
      --accent-dark: #d4a8f0;
      --radius-pill: 9999px;
      --font-display: 'Libre Baskerville', serif;
      --font-ui: 'Roboto', sans-serif;
    }

    html, body { height: 100%; }
    body {
      background-color: var(--bg);
      color: var(--ink);
      font-family: var(--font-ui);
      font-weight: 400;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow-x: hidden;
    }

    /* Texture overlay sits above the background color but below all content */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('texture.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      pointer-events: none;
      z-index: 0;
      mix-blend-mode: multiply;
      opacity: 0.9;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── MAIN ────────────────────────────────── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 64px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 48px;
    }

    .hero-image-wrap {
      display: flex;
      justify-content: flex-start;
      align-items: center;
    }
    .hero-image-wrap img {
      max-width: 100%;
      max-height: 80vh;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 28px;
    }
    .content--mobile-top { display: none; }

    .wordmark {
      height: 56px;
      width: auto;
    }

    .tagline {
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 20px;
      line-height: 1.4;
      color: var(--ink);
      position: relative;
      display: inline-block;
      text-align: center;
    }
    .tagline-text {
      display: inline-block;
      position: relative;
    }
    .tagline-underline {
      display: block;
      width: 100%;
      max-height: 10px;
      object-fit: contain;
      object-position: center top;
      margin-top: 2px;
      pointer-events: none;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--accent);
      color: var(--ink);
      font-family: var(--font-ui);
      font-weight: 500;
      font-size: 16px;
      text-decoration: none;
      padding: 16px 40px;
      border-radius: var(--radius-pill);
      border: 2px solid var(--ink);
      box-shadow: 4px 4px 0 var(--ink);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    .cta:hover {
      background: var(--accent-dark);
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--ink);
    }
    .cta:active {
      transform: translate(2px, 2px);
      box-shadow: 0 0 0 var(--ink);
    }
    .cta-icon {
      width: 18px;
      height: 18px;
      fill: var(--ink);
      flex-shrink: 0;
    }

    /* ─── FOOTER ──────────────────────────────── */
    footer {
      padding: 20px 48px 28px;
      text-align: center;
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .footer-links a {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
    }
    .footer-links a:hover { color: var(--ink); }
    .footer-copy {
      font-size: 12px;
      color: var(--muted);
    }

    /* ─── RESPONSIVE ──────────────────────────── */
    @media (max-width: 768px) {
      main {
        grid-template-columns: 1fr;
        gap: 32px;
        padding: 24px;
        text-align: center;
      }
      .content--mobile-top { display: flex; }
      .hero-image-wrap {
        justify-content: center;
      }
      .hero-image-wrap img {
        width: 100%;
        max-width: 480px;
        max-height: none;
      }
      .content {
        align-items: center;
      }
      .tagline {
        text-align: center;
        font-size: 18px;
      }
      .wordmark {
        height: 44px;
      }
      footer {
        padding: 16px 24px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <main>
      <div class="content content--mobile-top">
        <img src="wordmark-little-moments-black.png" alt="Little Moments" class="wordmark" />
        <div class="tagline">
          Not a boring journal. <br/>
          <span class="tagline-text">
            Try it for free to see why
            <img src="underline.png" alt="" class="tagline-underline" />
          </span>
        </div>
        <a href="https://apps.apple.com/us/app/little-moments-a-2min-journal/id6761054988" class="cta">
          <svg class="cta-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>

      </div>
      <div class="hero-image-wrap">
        <img src="hero.png" alt="Little Moments" />
      </div>
      <div class="content">
        <img src="wordmark-little-moments-black.png" alt="Little Moments" class="wordmark" />
        <div class="tagline">
          Not a boring journal. <br/>
          <span class="tagline-text">
            Try it for free to see why
            <img src="underline.png" alt="" class="tagline-underline" />
          </span>
        </div>
        <a href="https://apps.apple.com/us/app/little-moments-a-2min-journal/id6761054988" class="cta">
          <svg class="cta-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Capture first moment
        </a>
      </div>
    </main>

    <footer>
      <div class="footer-links">
        <a href="/terms">Terms &amp; Privacy</a>
        <a href="https://www.the-diff.com" target="_blank" rel="noopener">Follow my build in public</a>
      </div>
      <p class="footer-copy">&copy; 2026 Little Moments. All rights reserved.</p>
    </footer>
  </div>
</body>
</html>
